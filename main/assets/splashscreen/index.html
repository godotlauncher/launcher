<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; img-src 'self' file:; style-src 'unsafe-inline'"
        />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Starting Godot Launcher</title>
        <style>
            :root {
                color-scheme: light;
                font-family:
                    Inter, ui-sans-serif, system-ui, -apple-system,
                    BlinkMacSystemFont, "Segoe UI", sans-serif;
                background: oklch(100% 0 0);
                color: oklch(21% 0.006 285.885);
            }

            * {
                box-sizing: border-box;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
            }

            body {
                display: grid;
                place-items: center;
                user-select: none;
            }

            main {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 16px;
            }

            img {
                width: 40px;
                height: 40px;
                object-fit: contain;
                animation: bounce 1s infinite;
            }

            p {
                margin: 0;
                font-size: 14px;
                line-height: 1.5;
            }

            @keyframes bounce {
                0%,
                100% {
                    transform: translateY(-25%);
                    animation-timing-function: cubic-bezier(0.8, 0, 1, 1);
                }
                50% {
                    transform: none;
                    animation-timing-function: cubic-bezier(0, 0, 0.2, 1);
                }
            }

            @media (prefers-color-scheme: dark) {
                :root {
                    color-scheme: dark;
                    background: oklch(25.33% 0.016 252.42);
                    color: #a6abb6;
                }
            }

            @media (prefers-reduced-motion: reduce) {
                img {
                    animation: none;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <picture>
                <source
                    srcset="./logo-dark.svg"
                    media="(prefers-color-scheme: dark)"
                />
                <img
                    src="./logo-light.svg"
                    alt="Godot Launcher"
                    draggable="false"
                />
            </picture>
            <p>Getting things ready...</p>
        </main>
    </body>
</html>

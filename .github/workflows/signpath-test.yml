name: SignPath Test Signing

on:
  workflow_dispatch:
    inputs:
      signing_policy_slug:
        description: "SignPath test signing policy slug"
        required: true
        default: "test-signing"
        type: string
      windows_artifact_configuration_slug:
        description: "SignPath Windows artifact configuration slug"
        required: true
        default: "release-windows"
        type: string
      signpath_wait_timeout_seconds:
        description: "Maximum seconds to wait for SignPath approval and signing"
        required: true
        default: "18000"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build-windows:
    name: Build and test sign Windows artifacts
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
    steps:
      - name: Validate SignPath configuration
        shell: pwsh
        run: |
          $missing = @()

          foreach ($name in @(
              'SIGNPATH_API_TOKEN',
              'SIGNPATH_ORGANIZATION_ID',
              'SIGNPATH_PROJECT_SLUG'
          )) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
                  $missing += $name
              }
          }

          if ($missing.Count -gt 0) {
              throw "Missing GitHub secret/variable(s): $($missing -join ', ')"
          }

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Sync npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package_version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build unsigned Windows artifacts
        run: npm run dist:win -- --publish never

      - name: Upload unsigned Windows dist artifact
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-dist-windows-unsigned-${{ steps.package_version.outputs.version }}
          path: |
            dist/Godot_Launcher-${{ steps.package_version.outputs.version }}-win*
            dist/*.yml
          if-no-files-found: error

      - name: Prepare Windows SignPath input
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path signpath-unsigned-windows | Out-Null
          $version = "${{ steps.package_version.outputs.version }}"
          $installers = Get-ChildItem -Path dist -Filter "Godot_Launcher-$version-win*.exe" -File

          if ($installers.Count -lt 1 -or $installers.Count -gt 3) {
              throw "Expected 1 to 3 Windows installers for version $version, found $($installers.Count)."
          }

          foreach ($installer in $installers) {
              Copy-Item -LiteralPath $installer.FullName -Destination (Join-Path signpath-unsigned-windows $installer.Name)
              Write-Host "Prepared unsigned Windows artifact file: $($installer.Name)"
          }

      - name: Upload Windows SignPath input
        id: upload_unsigned_windows
        uses: actions/upload-artifact@v7
        with:
          name: signpath-unsigned-windows-${{ steps.package_version.outputs.version }}
          path: signpath-unsigned-windows/*.exe
          if-no-files-found: error

      - name: Submit Windows SignPath test signing request
        id: submit_signpath_windows
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ inputs.signing_policy_slug }}
          artifact-configuration-slug: ${{ inputs.windows_artifact_configuration_slug }}
          github-artifact-id: ${{ steps.upload_unsigned_windows.outputs.artifact-id }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: ${{ inputs.signpath_wait_timeout_seconds }}
          output-artifact-directory: ${{ github.workspace }}\signpath-signed-windows

      - name: Show Windows SignPath request
        shell: pwsh
        run: |
          Write-Host "SignPath request: ${{ steps.submit_signpath_windows.outputs.signing-request-web-url }}"

      - name: Inspect signed Windows artifacts
        shell: pwsh
        run: |
          $version = "${{ steps.package_version.outputs.version }}"
          $signedInstallers = Get-ChildItem -Path signpath-signed-windows -Filter "Godot_Launcher-$version-win*.exe" -Recurse -File

          if ($signedInstallers.Count -lt 1 -or $signedInstallers.Count -gt 3) {
              throw "Expected 1 to 3 signed Windows installers for version $version, found $($signedInstallers.Count)."
          }

          foreach ($installer in $signedInstallers) {
              $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
              Write-Host "Signed artifact: $($installer.Name)"
              Write-Host "  Signature status: $($signature.Status)"
              Write-Host "  Signer subject: $($signature.SignerCertificate.Subject)"
              Write-Host "  Signer thumbprint: $($signature.SignerCertificate.Thumbprint)"
          }

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-dist-windows-signed-${{ steps.package_version.outputs.version }}
          path: signpath-signed-windows/**
          if-no-files-found: error

name: SignPath Test Signing

on:
  workflow_dispatch:
    inputs:
      signing_policy_slug:
        description: "SignPath test signing policy slug"
        required: true
        default: "test-signing"
        type: string
      windows_artifact_configuration_slug:
        description: "SignPath Windows artifact configuration slug"
        required: true
        default: "release-windows"
        type: string
      linux_deb_artifact_configuration_slug:
        description: "SignPath Linux deb artifact configuration slug"
        required: true
        default: "release-linux-deb"
        type: string
      linux_rpm_artifact_configuration_slug:
        description: "SignPath Linux rpm artifact configuration slug"
        required: true
        default: "release-linux-rpm"
        type: string

permissions:
  actions: read
  contents: read

jobs:
  build-windows:
    name: Build and test sign Windows artifacts
    runs-on: windows-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
    steps:
      - name: Validate SignPath configuration
        shell: pwsh
        run: |
          $missing = @()

          foreach ($name in @(
              'SIGNPATH_API_TOKEN',
              'SIGNPATH_ORGANIZATION_ID',
              'SIGNPATH_PROJECT_SLUG'
          )) {
              if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
                  $missing += $name
              }
          }

          if ($missing.Count -gt 0) {
              throw "Missing GitHub secret/variable(s): $($missing -join ', ')"
          }

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Sync npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package_version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build unsigned Windows artifacts
        run: npm run dist:win -- --publish never

      - name: Upload Windows dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-dist-windows-${{ steps.package_version.outputs.version }}
          path: |
            dist/Godot_Launcher-${{ steps.package_version.outputs.version }}-win_*
            dist/latest.yml
          if-no-files-found: error

      - name: Prepare Windows SignPath input
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path signpath-unsigned-windows | Out-Null
          $installers = Get-ChildItem -Path dist -Filter "Godot_Launcher-${{ steps.package_version.outputs.version }}-win_*.exe" -File

          if ($installers.Count -eq 0) {
              throw "No Windows installers found for version ${{ steps.package_version.outputs.version }}."
          }

          foreach ($installer in $installers) {
              Copy-Item -LiteralPath $installer.FullName -Destination (Join-Path signpath-unsigned-windows $installer.Name)
              Write-Host "Prepared unsigned artifact file: $($installer.Name)"
          }

      - name: Upload Windows SignPath input
        id: upload_unsigned
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-unsigned-windows-${{ steps.package_version.outputs.version }}
          path: signpath-unsigned-windows/*.exe
          if-no-files-found: error

      - name: Submit Windows SignPath test signing request
        id: submit_signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ inputs.signing_policy_slug }}
          artifact-configuration-slug: ${{ inputs.windows_artifact_configuration_slug }}
          github-artifact-id: ${{ steps.upload_unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}\signpath-signed-windows

      - name: Show Windows SignPath request
        shell: pwsh
        run: |
          Write-Host "SignPath request: ${{ steps.submit_signpath.outputs.signing-request-web-url }}"

      - name: Inspect signed Windows artifacts
        shell: pwsh
        run: |
          $signedDir = Join-Path $env:GITHUB_WORKSPACE 'signpath-signed-windows'
          $signedInstallers = Get-ChildItem -Path $signedDir -Filter '*.exe' -Recurse -File

          if ($signedInstallers.Count -eq 0) {
              throw "SignPath completed, but no signed Windows EXE files were downloaded."
          }

          foreach ($installer in $signedInstallers) {
              $signature = Get-AuthenticodeSignature -FilePath $installer.FullName
              Write-Host "Signed artifact: $($installer.Name)"
              Write-Host "  Signature status: $($signature.Status)"
              Write-Host "  Signer subject: $($signature.SignerCertificate.Subject)"
              Write-Host "  Signer thumbprint: $($signature.SignerCertificate.Thumbprint)"
          }

      - name: Upload signed Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-signed-windows-${{ steps.package_version.outputs.version }}
          path: signpath-signed-windows/**
          if-no-files-found: error

  build-linux:
    name: Build and test sign Linux artifacts
    runs-on: ubuntu-latest
    env:
      SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
      SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
      SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
    steps:
      - name: Validate SignPath configuration
        shell: bash
        run: |
          set -euo pipefail
          missing=()

          for name in \
            SIGNPATH_API_TOKEN \
            SIGNPATH_ORGANIZATION_ID \
            SIGNPATH_PROJECT_SLUG; do
            if [ -z "${!name:-}" ]; then
              missing+=("${name}")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing GitHub secret/variable(s): %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Sync npm version
        run: npm install --global npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package_version
        shell: bash
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Build unsigned Linux artifacts
        run: npm run dist:linux -- --publish never

      - name: Upload Linux dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-dist-linux-${{ steps.package_version.outputs.version }}
          path: |
            dist/Godot_Launcher-${{ steps.package_version.outputs.version }}-linux_*
            dist/latest-linux*.yml
          if-no-files-found: error

      - name: Prepare Linux deb SignPath input
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signpath-unsigned-linux-deb
          shopt -s nullglob
          debs=(dist/Godot_Launcher-"${{ steps.package_version.outputs.version }}"-linux_*.deb)

          if [ "${#debs[@]}" -eq 0 ]; then
            echo "No Linux deb artifacts found for version ${{ steps.package_version.outputs.version }}." >&2
            exit 1
          fi

          cp "${debs[@]}" signpath-unsigned-linux-deb/
          printf 'Prepared unsigned deb files:\n'
          printf '  %s\n' "${debs[@]##*/}"

      - name: Upload Linux deb SignPath input
        id: upload_unsigned_deb
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-unsigned-linux-deb-${{ steps.package_version.outputs.version }}
          path: signpath-unsigned-linux-deb/*.deb
          if-no-files-found: error

      - name: Submit Linux deb SignPath test signing request
        id: submit_signpath_deb
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ inputs.signing_policy_slug }}
          artifact-configuration-slug: ${{ inputs.linux_deb_artifact_configuration_slug }}
          github-artifact-id: ${{ steps.upload_unsigned_deb.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}/signpath-signed-linux-deb

      - name: Show Linux deb SignPath request
        shell: bash
        run: |
          echo "SignPath request: ${{ steps.submit_signpath_deb.outputs.signing-request-web-url }}"

      - name: Inspect signed Linux deb artifacts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t signed_artifacts < <(find signpath-signed-linux-deb -type f -name '*.deb' | sort)

          if [ "${#signed_artifacts[@]}" -eq 0 ]; then
            echo "SignPath completed, but no signed Linux deb artifacts were downloaded." >&2
            exit 1
          fi

          printf 'Signed Linux deb artifacts:\n'
          printf '  %s\n' "${signed_artifacts[@]}"

      - name: Prepare Linux rpm SignPath input
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p signpath-unsigned-linux-rpm
          shopt -s nullglob
          rpms=(dist/Godot_Launcher-"${{ steps.package_version.outputs.version }}"-linux_*.rpm)

          if [ "${#rpms[@]}" -eq 0 ]; then
            echo "No Linux rpm artifacts found for version ${{ steps.package_version.outputs.version }}." >&2
            exit 1
          fi

          cp "${rpms[@]}" signpath-unsigned-linux-rpm/
          printf 'Prepared unsigned rpm files:\n'
          printf '  %s\n' "${rpms[@]##*/}"

      - name: Upload Linux rpm SignPath input
        id: upload_unsigned_rpm
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-unsigned-linux-rpm-${{ steps.package_version.outputs.version }}
          path: signpath-unsigned-linux-rpm/*.rpm
          if-no-files-found: error

      - name: Submit Linux rpm SignPath test signing request
        id: submit_signpath_rpm
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ inputs.signing_policy_slug }}
          artifact-configuration-slug: ${{ inputs.linux_rpm_artifact_configuration_slug }}
          github-artifact-id: ${{ steps.upload_unsigned_rpm.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: ${{ github.workspace }}/signpath-signed-linux-rpm

      - name: Show Linux rpm SignPath request
        shell: bash
        run: |
          echo "SignPath request: ${{ steps.submit_signpath_rpm.outputs.signing-request-web-url }}"

      - name: Inspect signed Linux rpm artifacts
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t signed_artifacts < <(find signpath-signed-linux-rpm -type f -name '*.rpm' | sort)

          if [ "${#signed_artifacts[@]}" -eq 0 ]; then
            echo "SignPath completed, but no signed Linux rpm artifacts were downloaded." >&2
            exit 1
          fi

          printf 'Signed Linux rpm artifacts:\n'
          printf '  %s\n' "${signed_artifacts[@]}"

      - name: Upload signed Linux artifacts
        uses: actions/upload-artifact@v7
        with:
          name: signpath-test-signed-linux-${{ steps.package_version.outputs.version }}
          path: |
            signpath-signed-linux-deb/**
            signpath-signed-linux-rpm/**
          if-no-files-found: error
